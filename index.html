<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA manifest & theme -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4361ee" />

    <!-- App identity -->
    <title>EventHub — London Events</title>
    <meta name="description" content="Discover, book and manage London events. Get your QR ticket in seconds." />
    <meta name="application-name" content="EventHub" />
    <meta name="keywords" content="events, tickets, London, QR code, RSVP, music, business, arts" />

    <!-- iOS PWA (Add to Home Screen support) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EventHub" />
    <link rel="apple-touch-icon" href="/app-icon.svg" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph (WhatsApp / iMessage share cards) -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="EventHub — London Events" />
    <meta property="og:description" content="Discover and book London events in seconds. Free QR ticket delivery." />
    <meta property="og:image"       content="/app-icon.svg" />

    <!-- Mobile UI polish -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="msapplication-TileColor" content="#4361ee" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
