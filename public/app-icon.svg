<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="28%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#0a0a1e"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4361ee" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#4361ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Blue ambient glow top-right -->
  <circle cx="430" cy="82" r="260" fill="url(#glow)"/>

  <!-- Ticket body -->
  <rect x="56" y="176" width="400" height="210" rx="18" fill="#111122"/>
  <rect x="56" y="176" width="400" height="210" rx="18" fill="none" stroke="#4361ee" stroke-width="2" stroke-opacity="0.45"/>

  <!-- Ticket left notch -->
  <circle cx="56" cy="281" r="22" fill="#000000"/>
  <!-- Ticket right notch -->
  <circle cx="456" cy="281" r="22" fill="#000000"/>

  <!-- Perforation line -->
  <line x1="160" y1="183" x2="160" y2="379" stroke="#4361ee" stroke-width="2"
        stroke-dasharray="10 7" stroke-opacity="0.4"/>

  <!-- QR hint (left stub) -->
  <rect x="80"  y="220" width="28" height="28" rx="4" fill="#4361ee" opacity="0.7"/>
  <rect x="112" y="220" width="28" height="28" rx="4" fill="#4361ee" opacity="0.4"/>
  <rect x="80"  y="252" width="28" height="28" rx="4" fill="#4361ee" opacity="0.4"/>
  <rect x="112" y="252" width="28" height="28" rx="4" fill="#4361ee" opacity="0.7"/>

  <!-- EVENT●HUB text (right of stub) -->
  <text x="308" y="250"
        font-family="'Courier New', Courier, monospace"
        font-size="52" font-weight="bold" fill="#ffffff"
        text-anchor="middle" letter-spacing="2">EVENT</text>
  <text x="308" y="307"
        font-family="'Courier New', Courier, monospace"
        font-size="44" fill="#4361ee"
        text-anchor="middle" letter-spacing="4">●HUB</text>

  <!-- Decorative star -->
  <text x="422" y="170" font-size="28" fill="#4361ee" opacity="0.6"
        font-family="sans-serif">✦</text>
</svg>
